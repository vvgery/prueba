     <header class="text-center py-5 bg-light border-bottom">
    <div class="container">
        <h1 class="fw-bold display-5">Contacto</h1>
        <p class="lead text-muted">¿Tienes dudas? Contáctanos</p>
    </div>
</header>
     <main class="container">
      <div class="row justify-content-center">
        <div class="col-md-6">
         <form> 
            <div class="mb-3">
                <label for="Nombre" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="Nombre" placeholder="Tu nombre">
            </div>
            <div class="mb-3">
                <label for="Apellido" class="form-label">Apellido</label>
                <input type="text" class="form-control" id="Apellido" placeholder="Tu apellido">
            </div>
            <div class="mb-3">
                <label for="exampleFormControlInput1" class="form-label">Correo Electronico</label>
                <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="nombre@gmail.com">
            </div>
            <div class="mb-3">
                <label for="exampleFormControlTextarea1" class="form-label">Mensaje</label>
                <textarea class="form-control" id="exampleFormControlTextarea1" placeholder="Escribe tu mensaje aquí..." rows="3"></textarea>
            </div>
            <!--Este es un boton para enviar el formulario-->
            <button type="submit" class="btn btn-dark">Enviar</button>
            
        </form>
